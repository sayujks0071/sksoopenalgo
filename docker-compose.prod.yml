version: '3.8'

services:
  # PostgreSQL Database for persistent trading data
  postgres:
    image: postgres:15-alpine
    container_name: openalgo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-openalgo_trading}
      POSTGRES_USER: ${DB_USER:-openalgo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_env}
    ports:
      - "5432:5432"  # Expose only to OpenAlgo container (not host)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openalgo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - openalgo_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OpenAlgo Trading Platform
  openalgo:
    build:
      context: ./openalgo
      dockerfile: Dockerfile
    container_name: openalgo-app
    image: openalgo:prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # App Configuration
      APP_MODE: standalone
      FLASK_ENV: production
      FLASK_DEBUG: 'False'
      FLASK_HOST_IP: 0.0.0.0
      FLASK_PORT: 5000
      TZ: Asia/Kolkata

      # Custom Domain Configuration
      HOST_SERVER: ${HOST_SERVER:-http://localhost:5000}
      
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-openalgo}:${DB_PASSWORD:-change_me_in_env}@postgres:5432/${DB_NAME:-openalgo_trading}
      LATENCY_DATABASE_URL: sqlite:///db/latency.db
      LOGS_DATABASE_URL: sqlite:///db/logs.db
      SANDBOX_DATABASE_URL: sqlite:///db/sandbox.db
      HISTORIFY_DATABASE_URL: db/historify.duckdb

      # Security Configuration
      APP_KEY: ${APP_KEY}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      CSRF_ENABLED: 'TRUE'
      CSP_ENABLED: 'TRUE'
      
      # Broker Configuration - Dhan API
      # NOTE: OpenAlgo reads BROKER_API_KEY / BROKER_API_SECRET from environment.
      BROKER_API_KEY: ${BROKER_API_KEY}
      BROKER_API_SECRET: ${BROKER_API_SECRET}
      VALID_BROKERS: dhan,dhan_sandbox
      REDIRECT_URL: ${HOST_SERVER:-http://localhost:5000}/dhan/callback

      # WebSocket Configuration
      WEBSOCKET_HOST: 0.0.0.0
      WEBSOCKET_PORT: 8765
      WEBSOCKET_URL: ${WEBSOCKET_URL:-ws://localhost:8765}
      
      # ZeroMQ Configuration
      ZMQ_HOST: 0.0.0.0
      ZMQ_PORT: 5555

      # Resource Limits (for Docker)
      STRATEGY_MEMORY_LIMIT_MB: '1024'
      OPENBLAS_NUM_THREADS: '2'
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
      NUMEXPR_NUM_THREADS: '2'
      NUMBA_NUM_THREADS: '2'

      # Logging Configuration
      LOG_TO_FILE: 'True'
      LOG_LEVEL: INFO
      LOG_DIR: log
      LOG_RETENTION: '14'
      
      # Rate Limiting
      LOGIN_RATE_LIMIT_MIN: "5 per minute"
      LOGIN_RATE_LIMIT_HOUR: "25 per hour"
      API_RATE_LIMIT: "50 per second"
      ORDER_RATE_LIMIT: "10 per second"

      # CORS Configuration (Allow Nginx)
      CORS_ENABLED: 'TRUE'
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost}

      # Strategy Configuration
      ENABLE_STRATEGY_WATCHDOG: 'TRUE'
    
    ports:
      - "5000:5000"      # Flask app
      - "8765:8765"      # WebSocket
      - "5555:5555"      # ZeroMQ
    
    volumes:
      # Persistent volumes for data
      - openalgo_db:/app/db
      - openalgo_log:/app/log
      - openalgo_strategies:/app/strategies
      - openalgo_keys:/app/keys
      - openalgo_tmp:/app/tmp
      
      # Mount .env file as read-only
      - ./.env:/app/.env:ro
      
      # Mount custom strategies if they exist
      - ./strategies:/app/strategies:rw
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/auth/check-setup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    networks:
      - openalgo_network
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Nginx Reverse Proxy for SSL/TLS and custom domain
  nginx:
    image: nginx:alpine
    container_name: openalgo-nginx
    depends_on:
      - openalgo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      
      # SSL certificates (Let's Encrypt Certbot)
      - ./ssl/certbot/conf:/etc/letsencrypt:ro
      - ./ssl/certbot/www:/var/www/certbot:ro
      
      # Cache and logs
      - nginx_cache:/var/cache/nginx
      - ./logs/nginx:/var/log/nginx
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    restart: unless-stopped
    networks:
      - openalgo_network
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Certbot for Let's Encrypt SSL certificate automation
  certbot:
    image: certbot/certbot
    container_name: openalgo-certbot
    volumes:
      - ./ssl/certbot/conf:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - openalgo_network

# Named volumes for persistent data
volumes:
  postgres_data:
    driver: local
  openalgo_db:
    driver: local
  openalgo_log:
    driver: local
  openalgo_strategies:
    driver: local
  openalgo_keys:
    driver: local
  openalgo_tmp:
    driver: local
  nginx_cache:
    driver: local

# Network for inter-container communication
networks:
  openalgo_network:
    driver: bridge
